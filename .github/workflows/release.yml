name: Release Distribution Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      HDHR_LIBHDHOMERUN_DIR: ${{ github.workspace }}/.vendor/libhdhomerun
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out libhdhomerun vendor sources
        uses: actions/checkout@v4
        with:
          repository: Silicondust/libhdhomerun
          path: .vendor/libhdhomerun
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' backend/Cargo.toml | head -n1)"
          client_version="$(sed -n 's/^project(hdhomerun-linux-player-client VERSION \([0-9.]*\) LANGUAGES CXX)$/\1/p' client/CMakeLists.txt | head -n1)"

          if [[ -z "$cargo_version" || -z "$client_version" ]]; then
            echo "Failed to resolve project versions from source files." >&2
            exit 1
          fi

          if [[ "$cargo_version" != "$client_version" ]]; then
            echo "Client and backend versions do not match: backend=$cargo_version client=$client_version" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          expected_tag="v${cargo_version}"
          if [[ "$release_tag" != "$expected_tag" ]]; then
            echo "Release tag $release_tag does not match source version tag $expected_tag" >&2
            exit 1
          fi

          echo "version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            cmake \
            curl \
            desktop-file-utils \
            dpkg-dev \
            file \
            flatpak \
            flatpak-builder \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfuse2 \
            libgl1-mesa-dev \
            ninja-build \
            pkg-config \
            qml6-module-qtmultimedia \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-multimedia-dev \
            qt6-tools-dev-tools

      - name: Install appimagetool
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --output /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool

      - name: Configure Flatpak remote
        shell: bash
        run: |
          set -euo pipefail
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build and verify distribution packages
        shell: bash
        env:
          HDHR_PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          dbus-run-session -- sh ./packaging/build-and-verify-dist.sh

      - name: Generate release checksums
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            "hdhomerun-linux-player_${VERSION}_amd64.deb" \
            HDHomeRunLinuxPlayer-x86_64.AppImage \
            HDHomeRunLinuxPlayer.flatpak \
            > SHASUMS256.txt

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: hdhomerun-linux-player-${{ steps.meta.outputs.version }}
          path: |
            dist/hdhomerun-linux-player_${{ steps.meta.outputs.version }}_amd64.deb
            dist/HDHomeRunLinuxPlayer-x86_64.AppImage
            dist/HDHomeRunLinuxPlayer.flatpak
            dist/SHASUMS256.txt
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: HDHomeRun Linux Player ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/hdhomerun-linux-player_${{ steps.meta.outputs.version }}_amd64.deb
            dist/HDHomeRunLinuxPlayer-x86_64.AppImage
            dist/HDHomeRunLinuxPlayer.flatpak
            dist/SHASUMS256.txt

name: Release Distribution Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish, for example v0.2.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          cargo_version="$(sed -n 's/^version = "\([^"]*\)"$/\1/p' backend/Cargo.toml | head -n1)"
          client_version="$(sed -n 's/^project(hdhomerun-linux-player-client VERSION \([0-9.]*\) LANGUAGES CXX)$/\1/p' client/CMakeLists.txt | head -n1)"

          if [[ -z "$cargo_version" || -z "$client_version" ]]; then
            echo "Failed to resolve project versions from source files." >&2
            exit 1
          fi

          if [[ "$cargo_version" != "$client_version" ]]; then
            echo "Client and backend versions do not match: backend=$cargo_version client=$client_version" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            release_tag="${{ inputs.release_tag }}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi

          expected_tag="v${cargo_version}"
          if [[ "$release_tag" != "$expected_tag" ]]; then
            echo "Release tag $release_tag does not match source version tag $expected_tag" >&2
            exit 1
          fi

          echo "version=$cargo_version" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_name: amd64
            runner: ubuntu-24.04
            deb_arch: amd64
            appimage_arch: x86_64
            flatpak_arch: x86_64
          - arch_name: arm64
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            appimage_arch: aarch64
            flatpak_arch: aarch64

    runs-on: ${{ matrix.runner }}
    env:
      HDHR_LIBHDHOMERUN_DIR: ${{ github.workspace }}/.vendor/libhdhomerun
      HDHR_PACKAGE_ARCH: ${{ matrix.deb_arch }}
      HDHR_APPIMAGE_ARCH: ${{ matrix.appimage_arch }}
      HDHR_FLATPAK_ARCH: ${{ matrix.flatpak_arch }}
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out libhdhomerun vendor sources
        uses: actions/checkout@v4
        with:
          repository: Silicondust/libhdhomerun
          path: .vendor/libhdhomerun
          fetch-depth: 1
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            cmake \
            curl \
            desktop-file-utils \
            dpkg-dev \
            file \
            flatpak \
            flatpak-builder \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libfuse2 \
            libgl1-mesa-dev \
            ninja-build \
            pkg-config \
            qml6-module-qtmultimedia \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qt6-base-dev \
            qt6-base-dev-tools \
            qt6-declarative-dev \
            qt6-multimedia-dev \
            qt6-tools-dev-tools

      - name: Install appimagetool
        shell: bash
        run: |
          set -euo pipefail
          curl -L --fail --output /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage
          chmod +x /tmp/appimagetool.AppImage
          sudo mv /tmp/appimagetool.AppImage /usr/local/bin/appimagetool

      - name: Configure Flatpak remote
        shell: bash
        run: |
          set -euo pipefail
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Build and verify distribution packages
        shell: bash
        env:
          HDHR_PACKAGE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          dbus-run-session -- sh ./packaging/build-and-verify-dist.sh

      - name: Generate release checksums
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          DEB_ARCH: ${{ matrix.deb_arch }}
          APPIMAGE_ARCH: ${{ matrix.appimage_arch }}
          FLATPAK_ARCH: ${{ matrix.flatpak_arch }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            "hdhomerun-linux-player_${VERSION}_${DEB_ARCH}.deb" \
            "HDHomeRunLinuxPlayer-${APPIMAGE_ARCH}.AppImage" \
            "HDHomeRunLinuxPlayer-${FLATPAK_ARCH}.flatpak" \
            > "SHASUMS256-${DEB_ARCH}.txt"

      - name: Upload release artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: hdhomerun-linux-player-${{ needs.prepare.outputs.version }}-${{ matrix.arch_name }}
          path: |
            dist/hdhomerun-linux-player_${{ needs.prepare.outputs.version }}_${{ matrix.deb_arch }}.deb
            dist/HDHomeRunLinuxPlayer-${{ matrix.appimage_arch }}.AppImage
            dist/HDHomeRunLinuxPlayer-${{ matrix.flatpak_arch }}.flatpak
            dist/SHASUMS256-${{ matrix.deb_arch }}.txt
          if-no-files-found: error

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-24.04

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: hdhomerun-linux-player-${{ needs.prepare.outputs.version }}-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: HDHomeRun Linux Player ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            release-artifacts/*

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .bg { fill: #08131c; }
      .panel { fill: #0d1b26; stroke: #173245; stroke-width: 2; rx: 20; }
      .subpanel { fill: #112434; stroke: #23475f; stroke-width: 2; rx: 16; }
      .guide { fill: #0d1a24; stroke: #183447; stroke-width: 2; rx: 22; }
      .surface { fill: #050b11; stroke: #1b3343; stroke-width: 2; rx: 18; }
      .toolbar { fill: #0d1b26; stroke: #173245; stroke-width: 2; }
      .label { fill: #eff7fb; font-family: 'IBM Plex Sans', sans-serif; font-size: 22px; font-weight: 700; }
      .text { fill: #c7d8e4; font-family: 'IBM Plex Sans', sans-serif; font-size: 15px; }
      .small { fill: #8ea7b9; font-family: 'IBM Plex Sans', sans-serif; font-size: 13px; }
      .tiny { fill: #8ea7b9; font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; }
      .pill { fill: #173247; stroke: #5cb9ea; stroke-width: 2; rx: 14; }
      .diagCard { fill: #163042; stroke: #28516a; stroke-width: 2; rx: 12; }
      .guideCell { fill: #1a3243; stroke: #35617b; stroke-width: 1.5; rx: 10; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900" />

  <rect class="toolbar" x="0" y="0" width="1400" height="88" />
  <text class="label" x="36" y="52">Top Toolbar</text>
  <rect class="subpanel" x="300" y="22" width="1060" height="44" />
  <text class="text" x="324" y="50">Device Selector</text>

  <rect class="panel" x="18" y="106" width="1364" height="486" />
  <text class="label" x="42" y="148">PlaybackStage Outer Panel</text>
  <text class="small" x="42" y="173">example title shown here: Restoring last context</text>

  <rect class="subpanel" x="980" y="124" width="160" height="44" />
  <text class="tiny" x="1018" y="151">Status Pill</text>

  <rect class="subpanel" x="1156" y="116" width="200" height="78" />
  <text class="tiny" x="1174" y="138">Inline Tuner Diagnostics Strip</text>
  <rect class="diagCard" x="1170" y="148" width="40" height="30" />
  <rect class="diagCard" x="1218" y="148" width="40" height="30" />
  <rect class="diagCard" x="1266" y="148" width="40" height="30" />
  <rect class="diagCard" x="1314" y="148" width="40" height="30" />

  <rect class="surface" x="32" y="206" width="1336" height="370" />
  <text class="label" x="56" y="244">Embedded Surface Panel</text>
  <text class="small" x="56" y="270">Video surface or placeholder canvas fills this panel</text>

  <rect class="subpanel" x="420" y="326" width="560" height="100" />
  <text class="label" x="465" y="370">Centered Placeholder Text</text>
  <text class="text" x="455" y="400">Select a playable channel to start the embedded surface</text>

  <rect class="guide" x="18" y="606" width="1364" height="276" />
  <text class="label" x="42" y="648">Guide Panel</text>
  <text class="small" x="42" y="673">Resize handle sits above this panel</text>

  <rect class="subpanel" x="1236" y="622" width="112" height="38" />
  <text class="tiny" x="1272" y="646">Now</text>

  <rect class="subpanel" x="40" y="694" width="220" height="168" />
  <text class="text" x="58" y="720">Channel Column</text>
  <rect class="diagCard" x="56" y="736" width="188" height="34" />
  <rect class="diagCard" x="56" y="778" width="188" height="34" />
  <rect class="diagCard" x="56" y="820" width="188" height="34" />

  <rect class="subpanel" x="278" y="694" width="1074" height="34" />
  <text class="text" x="300" y="717">Time Slot Header</text>

  <rect class="guideCell" x="278" y="738" width="220" height="34" />
  <rect class="guideCell" x="508" y="738" width="180" height="34" />
  <rect class="guideCell" x="698" y="738" width="240" height="34" />
  <rect class="guideCell" x="948" y="738" width="180" height="34" />
  <rect class="guideCell" x="1138" y="738" width="196" height="34" />

  <rect class="guideCell" x="278" y="782" width="170" height="34" />
  <rect class="guideCell" x="458" y="782" width="250" height="34" />
  <rect class="guideCell" x="718" y="782" width="190" height="34" />
  <rect class="guideCell" x="918" y="782" width="210" height="34" />
  <rect class="guideCell" x="1138" y="782" width="196" height="34" />

  <rect class="guideCell" x="278" y="826" width="210" height="34" />
  <rect class="guideCell" x="498" y="826" width="160" height="34" />
  <rect class="guideCell" x="668" y="826" width="220" height="34" />
  <rect class="guideCell" x="898" y="826" width="220" height="34" />
  <rect class="guideCell" x="1128" y="826" width="206" height="34" />
</svg>

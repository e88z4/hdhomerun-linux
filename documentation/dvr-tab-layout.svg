  <text x="46" y="186" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="13">Grouped series list. Select one recording here.</text>

  <rect x="46" y="206" width="316" height="48" rx="12" fill="#112838" stroke="#2d5a74"/>

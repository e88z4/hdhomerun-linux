  <text x="592" y="426" fill="#6f8798" font-family="IBM Plex Sans, sans-serif" font-size="16">Recorded video surface</text>

  <rect x="428" y="552" width="458" height="164" rx="24" fill="#0d1a24" stroke="#183447"/>

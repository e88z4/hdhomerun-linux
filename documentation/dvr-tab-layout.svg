  <text x="970" y="323" fill="#bcd0dc" font-family="IBM Plex Sans, sans-serif" font-size="12">Episode title</text>
  <text x="970" y="344" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="11">Channel • Start date/time</text>
  <rect x="970" y="360" width="112" height="26" rx="10" fill="#ffffff" stroke="#d9d9d9"/>
  <rect x="1094" y="360" width="124" height="26" rx="10" fill="#ffffff" stroke="#d9d9d9"/>
  <text x="978" y="378" fill="#222" font-family="IBM Plex Sans, sans-serif" font-size="11">Rule Options</text>
  <text x="1104" y="378" fill="#222" font-family="IBM Plex Sans, sans-serif" font-size="11">Delete Rule</text>

  <text x="24" y="750" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="12">Wide layout note: the left rail is Recordings, the center column is Status + Playback + Recording Details, and the right rail is Upcoming.</text>

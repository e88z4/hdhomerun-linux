  <text x="104" y="329" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="12">2 episodes</text>

  <rect x="58" y="346" width="292" height="76" rx="16" fill="#16384c" stroke="#69c6ff"/>
  <text x="74" y="375" fill="#eff7fb" font-family="IBM Plex Sans, sans-serif" font-size="14" font-weight="700">Recording title or episode title</text>
  <text x="74" y="395" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="12">Channel number • Channel name</text>
  <text x="74" y="413" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="12">Record start date/time</text>
  <text x="300" y="395" fill="#7fd4ff" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="700">Selected</text>

  <rect x="406" y="122" width="502" height="614" rx="24" fill="none" stroke="#173245" stroke-dasharray="8 8"/>
  <text x="428" y="150" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="13">Panel group B: Playback + details column</text>

  <rect x="428" y="170" width="458" height="64" rx="20" fill="#10232f" stroke="#23445b"/>

  <text x="448" y="612" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="12">Title, episode title, air date, synopsis, and DVR action buttons</text>
  <rect x="448" y="630" width="418" height="62" rx="14" fill="#112838" stroke="#2d5a74"/>

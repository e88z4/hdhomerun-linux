  <text x="464" y="674" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="12">Play / Stop / Delete / Rule Options live here</text>

  <rect x="930" y="122" width="326" height="614" rx="24" fill="#0d1a24" stroke="#183447"/>
  <text x="952" y="160" fill="#f2f7fb" font-family="IBM Plex Sans, sans-serif" font-size="24" font-weight="700">Panel C: Upcoming</text>
  <text x="952" y="186" fill="#8ea7b9" font-family="IBM Plex Sans, sans-serif" font-size="13">Scheduled upcoming DVR items and rule actions</text>

  <rect x="952" y="206" width="282" height="48" rx="12" fill="#112838" stroke="#2d5a74"/>
  <text x="1068" y="236" fill="#eff7fb" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="700">Refresh</text>

  <rect x="952" y="276" width="282" height="124" rx="18" fill="#101e29" stroke="#1d4259"/>
